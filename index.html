<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지현이를 위한 로즈데이 선물</title>
    <link href="https://fonts.googleapis.com/css2?family=Gamja+Flower&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-pink: #ffb7c5;
            --dark-pink: #ff4d6d;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #fff0f3;
            font-family: 'Gamja Flower', cursive;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }

        /* 비디오 컨테이너: 화면을 더 크게 */
        #video-container {
            position: relative;
            width: 95vw;
            max-width: 700px;
            height: 65vh; /* 화면의 65% 차지 */
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #000;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 꽉 차게 */
            transform: scaleX(-1); /* 거울 모드 */
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            z-index: 5;
        }

        /* 하단 UI 영역 (대화창 및 햄스터) */
        #bottom-ui {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 20px;
            z-index: 20;
        }

        /* 대화창: 얼굴을 가리지 않게 비디오 아래로 분리 */
        #dialog-box {
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 500px;
            text-align: center;
            font-size: 1.5rem;
            color: #444;
            display: none;
            margin-bottom: 10px;
            word-break: keep-all; /* 단어 끊김 방지 */
            min-height: 2.5rem;
        }

        /* 햄스터 캐릭터 (다운받은 이미지 사용) */
        #hamster {
            width: 120px;
            height: auto;
            transition: all 1s ease-in-out;
        }
        .waddle {
            animation: waddle 0.5s infinite;
        }
        @keyframes waddle {
            0% { transform: translateX(0) rotate(-5deg); }
            50% { transform: translateX(0) rotate(5deg); }
            100% { transform: translateX(0) rotate(-5deg); }
        }

        /* 스캔 UI */
        #scan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid var(--primary-pink);
            box-sizing: border-box;
            display: none;
            z-index: 6;
            background: linear-gradient(rgba(255,183,197,0.1) 50%, rgba(255,183,197,0.2) 50%);
            background-size: 100% 4px;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--dark-pink);
            top: 0;
            animation: scan 2s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* 장미 이미지 */
        #rose {
            position: absolute;
            width: 80px;
            display: none;
            z-index: 12;
            pointer-events: none;
        }

        /* 편지 모달 */
        #letter-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 85%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #letter-modal.show { transform: translate(-50%, -50%) scale(1); }
        .letter-content { font-size: 1.3rem; line-height: 1.6; color: #333; word-break: keep-all;}
        .heart { color: var(--dark-pink); font-size: 2rem; margin-top: 10px; }

        /* 시작 버튼 */
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 1.8rem;
            background: var(--dark-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Gamja Flower', cursive;
            transition: transform 0.2s;
            z-index: 50;
        }
        #start-btn:hover { transform: translate(-50%, -50%) scale(1.1); }
    </style>
</head>
<body>

    <button id="start-btn">❤️ 로즈데이 선물 열어보기 ❤️</button>

    <div id="video-container" style="display:none;">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div id="scan-overlay"><div class="scan-line"></div></div>
        <img id="rose" src="https://cdn-icons-png.flaticon.com/512/3405/3405863.png" alt="Rose">
    </div>

    <div id="bottom-ui" style="display:none;">
        <div id="dialog-box"></div>
        <img id="hamster" src="./hamster.png" alt="햄스터">
    </div>

    <div id="letter-modal">
        <div class="letter-content">
            지현아, 오늘 로즈데인데 직접 옆에서 꽃 못 전해줘서 미안해!<br><br>
            멀리 떨어져 있지만 내 마음은 항상 네 옆에 있는 거 알지?<br>
            이 햄스터가 배달한 장미 받고 오늘 하루 세상에서 제일 행복했으면 좋겠어.<br><br>
            <strong>사랑해 지현아! ❤️</strong>
        </div>
        <div class="heart">🌹✨</div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const dialogBox = document.getElementById('dialog-box');
        const hamster = document.getElementById('hamster');
        const rose = document.getElementById('rose');
        const scanOverlay = document.getElementById('scan-overlay');
        const startBtn = document.getElementById('start-btn');
        const videoContainer = document.getElementById('video-container');
        const bottomUI = document.getElementById('bottom-ui');

        let currentState = 'START';
        let isHandVisible = false;

        // 글자가 깨지지 않도록 타자기 효과 개선
        function typeWriter(text, i = 0) {
            if (i === 0) dialogBox.textContent = '';
            if (i < text.length) {
                dialogBox.textContent += text.charAt(i);
                setTimeout(() => typeWriter(text, i + 1), 50);
            }
        }

        function showMessage(text) {
            dialogBox.style.display = 'block';
            typeWriter(text);
        }

        async function nextStep() {
            switch(currentState) {
                case 'START':
                    startBtn.style.display = 'none';
                    videoContainer.style.display = 'block';
                    bottomUI.style.display = 'flex';
                    showMessage("안녕 지현아! 나 햄찌에유! 로즈데이 선물 배달 왔어유!");
                    currentState = 'GREETING';
                    setTimeout(nextStep, 3500);
                    break;

                case 'GREETING':
                    showMessage("잠깐! 지현이가 맞는지 얼굴 좀 확인해볼게유! (스캔 중...)");
                    scanOverlay.style.display = 'block';
                    currentState = 'SCANNING';
                    setTimeout(nextStep, 4000);
                    break;

                case 'SCANNING':
                    scanOverlay.style.display = 'none';
                    showMessage("지현이가 맞군유! 지현이가 맞다면 화면 보고 활짝 웃어보세유! 😆");
                    currentState = 'SMILE_CHECK';
                    setTimeout(nextStep, 4000); 
                    break;

                case 'SMILE_CHECK':
                    showMessage("아이 예뻐라! 확인 완료! 이제 화면에 손바닥을 펼쳐서 내밀어보세유!");
                    currentState = 'WAIT_FOR_HAND';
                    break;

                case 'FETCHING_ROSE':
                    showMessage("좋아유! 거기 딱 기다리세유! 금방 가져올게유!");
                    hamster.classList.add('waddle');
                    hamster.style.transform = 'translateX(-200vw)'; // 화면 밖으로 퇴장
                    
                    setTimeout(() => {
                        rose.style.display = 'block';
                        hamster.style.transform = 'translateX(0)'; // 다시 중앙으로
                        currentState = 'DELIVERING';
                        showMessage("영차 영차... 여기 장미 배달 왔어유! 손으로 받아주세유!");
                    }, 2500);
                    break;
            }
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                isHandVisible = true;

                if (currentState === 'WAIT_FOR_HAND') {
                    currentState = 'FETCHING_ROSE';
                    nextStep();
                }

                if (currentState === 'DELIVERING') {
                    // 장미가 손을 따라다님
                    rose.style.left = (landmarks[9].x * 100) + '%';
                    rose.style.top = (landmarks[9].y * 100) + '%';
                    rose.style.transform = 'translate(-50%, -50%)';
                    
                    setTimeout(finishEvent, 3000);
                }
            } else {
                isHandVisible = false;
            }
            canvasCtx.restore();
        }

        function finishEvent() {
            if (currentState === 'FINISHED') return;
            currentState = 'FINISHED';
            
            showMessage("지현아, 로즈데이 축하해! 사랑해유! ❤️");
            setTimeout(() => {
                hamster.style.transform = 'translateY(200px)'; // 아래로 퇴장
                dialogBox.style.display = 'none';
                
                // 꽃잎 효과
                const end = Date.now() + (5 * 1000);
                const colors = ['#ffb7c5', '#ff4d6d', '#ffffff'];

                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });

                    if (Date.now() < end) { requestAnimationFrame(frame); }
                }());

                // 편지 공개
                document.getElementById('letter-modal').classList.add('show');
            }, 2000);
        }

        startBtn.onclick = () => {
            const hands = new Hands({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
            });
            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });
            hands.onResults(onResults);

            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
            nextStep();
        };
    </script>
</body>
</html>
